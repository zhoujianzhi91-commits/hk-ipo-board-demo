name: Update IPO data

on:
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Deploy to Vercel even when no data file changed"
        required: false
        default: false
        type: boolean
  schedule:
    # Hong Kong time 09:00-12:45 on weekdays: active subscription windows.
    - cron: "*/15 1-4 * * 1-5"
    # Hong Kong time 16:15-18:45 on weekdays: dark market windows.
    - cron: "*/15 8-10 * * 1-5"
    # Hong Kong time 21:00-23:45 on weekdays: allotment result announcements.
    - cron: "*/15 13-15 * * 1-5"
    # Hong Kong time 00:00-00:45 Tue-Sat: late allotment result announcements.
    - cron: "*/15 16 * * 1-6"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ipo-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run official update
        run: python scripts/run_official_update.py

      - name: Commit data changes
        id: auto-commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update IPO data snapshot"
          file_pattern: "data/*.js"

      - name: Install Vercel CLI
        if: steps.auto-commit.outputs.changes_detected == 'true' || inputs.force_deploy == true
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        if: steps.auto-commit.outputs.changes_detected == 'true' || inputs.force_deploy == true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        if: steps.auto-commit.outputs.changes_detected == 'true' || inputs.force_deploy == true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prod --yes --no-wait --token="$VERCEL_TOKEN"
