name: Update IPO data

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Deploy even when no changes"
        required: false
        default: false
        type: boolean
  schedule:
    # Every 15 minutes: fetch HKEX data, auto-fix everything, deploy live
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: ipo-data-update
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: 🔄 Step 1 — Fetch new HKEX data (认购倍数/配售结果)
        run: python scripts/run_official_update.py

      - name: 🔄 Step 2 — Auto-fix all stock data (入场费/每手股数/中签率/清洗覆盖字段)
        run: python scripts/auto_fix_data.py

      - name: Commit all changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: data snapshot + fix"
          file_pattern: "data/*.js scripts/*.py"
