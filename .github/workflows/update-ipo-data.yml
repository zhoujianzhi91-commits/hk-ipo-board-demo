name: Update IPO data

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Deploy to Vercel even when no data file changed"
        required: false
        default: false
        type: boolean
  schedule:
    # Run every 15 minutes. The updater only processes active IPO candidates;
    # listed history and suspended/特殊情况 stocks are left untouched unless edited manually.
    - cron: "*/15 * * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  VERCEL_TELEMETRY_DISABLED: "1"

concurrency:
  group: ipo-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run official update
        run: python scripts/run_official_update.py

      - name: Commit data changes
        id: auto-commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update IPO data snapshot"
          file_pattern: "data/*.js"

      - name: Install Vercel CLI
        if: github.event_name == 'push' || steps.auto-commit.outputs.changes_detected == 'true' || inputs.force_deploy == true
        run: npm install -g vercel@54.6.1

      - name: Pull Vercel project settings
        if: github.event_name == 'push' || steps.auto-commit.outputs.changes_detected == 'true' || inputs.force_deploy == true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel output
        if: github.event_name == 'push' || steps.auto-commit.outputs.changes_detected == 'true' || inputs.force_deploy == true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        if: github.event_name == 'push' || steps.auto-commit.outputs.changes_detected == 'true' || inputs.force_deploy == true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          for attempt in 1 2 3; do
            echo "Vercel deploy attempt $attempt/3"
            if vercel deploy --prebuilt --prod --yes --no-wait --token="$VERCEL_TOKEN"; then
              exit 0
            fi
            if [ "$attempt" != "3" ]; then
              sleep 20
            fi
          done
          exit 1
