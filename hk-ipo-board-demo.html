<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>港股打新通 - 看板 Demo</title>
  <style>
    :root{
      --bg:#f2e7db;
      --surface:#fffaf5;
      --surface-soft:#fbf1e7;
      --surface-tint:#f4e6d8;
      --line:#eadbca;
      --line-soft:#f0e4d7;
      --text:#243044;
      --muted:#6e7787;
      --blue:#c65637;
      --green:#5f8f7d;
      --amber:#b97832;
      --red:#c65637;
      --shadow:0 22px 48px rgba(108,78,54,.13);
      --radius:12px;
    }
    *{box-sizing:border-box}
    html{
      width:100%;
      max-width:100%;
      height:100%;
      overflow-x:clip;
      overscroll-behavior-x:none;
    }
    body{
      position:fixed;
      inset:0;
      width:100%;
      max-width:100%;
      margin:0;
      height:100vh;
      min-height:100vh;
      overflow-x:clip;
      overflow-y:hidden;
      overscroll-behavior-x:none;
      touch-action:pan-y;
      background:
        radial-gradient(circle at 15% 8%, rgba(219,176,145,.48), transparent 30%),
        radial-gradient(circle at 82% 14%, rgba(229,215,180,.46), transparent 34%),
        linear-gradient(135deg,#f3e1d5 0%,#eee3d7 48%,#f8efe6 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
      letter-spacing:0;
      transition:background .28s ease,color .28s ease;
    }
    body.theme-live{
      background:
        radial-gradient(circle at 16% 8%, rgba(233,188,144,.55), transparent 32%),
        radial-gradient(circle at 84% 14%, rgba(240,216,176,.52), transparent 35%),
        linear-gradient(135deg,#f4dfcf 0%,#f1e3d3 48%,#fbf1e6 100%);
    }
    button,input{font:inherit}
    button{cursor:pointer}
    .page-shell{
      width:min(100%, 1480px);
      max-width:1480px;
      margin:0 auto;
      height:calc(100vh - 74px);
      padding:16px 22px 20px;
      display:flex;
      flex-direction:column;
      min-height:0;
      overflow:hidden;
    }
    .topbar{
      position:sticky;
      top:0;
      z-index:20;
      overflow-x:clip;
      background:rgba(247,238,228,.88);
      backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(231,215,201,.92);
      transition:background .28s ease,border-color .28s ease;
    }
    body.theme-live .topbar{
      background:rgba(249,239,227,.9);
      border-bottom-color:rgba(227,201,171,.96);
    }
    .topbar-inner{
      width:min(100%, 1480px);
      max-width:1480px;
      margin:0 auto;
      min-height:74px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      padding:12px 22px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }
    .brand-mark{
      position:relative;
      width:38px;
      height:38px;
      flex:0 0 auto;
      border-radius:10px;
      background:#243044;
      box-shadow:0 12px 24px rgba(84,58,42,.16), inset 0 0 0 1px rgba(255,255,255,.16);
    }
    .brand-mark:before{
      content:"";
      position:absolute;
      left:10px;
      right:10px;
      bottom:10px;
      height:14px;
      border-left:3px solid #8bc0a8;
      border-bottom:3px solid #8bc0a8;
      transform:skew(-16deg);
    }
    .brand-mark:after{
      content:"";
      position:absolute;
      right:8px;
      top:9px;
      width:7px;
      height:7px;
      border-radius:999px;
      background:#7fb29b;
      box-shadow:-10px 11px 0 -2px #d99561;
    }
    h1,h2,h3,p{margin:0}
    h1{
      font-size:22px;
      line-height:1.15;
      font-weight:900;
    }
    .brand p{
      margin-top:4px;
      color:var(--muted);
      font-size:13px;
      font-weight:650;
    }
    .top-actions{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:10px;
      flex-wrap:wrap;
    }
    .status-pill{
      min-height:30px;
      display:inline-flex;
      align-items:center;
      padding:0 11px;
      border:1px solid var(--line);
      border-radius:999px;
      background:var(--surface);
      color:#3f4a5d;
      font-size:12px;
      font-weight:850;
      box-shadow:0 1px 2px rgba(108,78,54,.04);
    }
    .board-layout{
      display:grid;
      grid-template-columns:minmax(300px, 360px) minmax(0, 1fr);
      gap:18px;
      align-items:stretch;
      flex:1;
      min-height:0;
      min-width:0;
      width:100%;
      max-width:100%;
      overflow-x:clip;
    }
    .panel{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:var(--surface);
      box-shadow:var(--shadow);
      transition:border-color .28s ease,background .28s ease,box-shadow .28s ease;
    }
    body.theme-live .panel{
      border-color:#e4cfb9;
      background:#fff9f2;
    }
    .stock-rail{
      height:100%;
      min-height:0;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .rail-head{
      padding:14px;
      border-bottom:1px solid var(--line-soft);
      background:linear-gradient(180deg,#fffaf5,#fbf1e7);
      transition:background .28s ease,border-color .28s ease;
    }
    body.theme-live .rail-head{
      border-bottom-color:#ecd7c1;
      background:linear-gradient(180deg,#fff8f0,#faeddc);
    }
    .search-line{
      position:relative;
      margin-bottom:10px;
    }
    .search-line input{
      width:100%;
      height:42px;
      padding:0 13px;
      border:1px solid #dfcdbb;
      border-radius:10px;
      background:#fffdf9;
      color:var(--text);
      outline:none;
      font-size:14px;
      font-weight:700;
    }
    .search-line input:focus{
      border-color:#d99a7e;
      box-shadow:0 0 0 4px rgba(198,86,55,.10);
    }
    .filter-row{
      display:flex;
      gap:7px;
      flex-wrap:nowrap;
      align-items:center;
      overflow:hidden;
      padding-top:0;
      margin-top:2px;
    }
    .chip{
      min-height:30px;
      flex:0 0 auto;
      padding:0 10px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fffdf9;
      color:#3f4a5d;
      font-size:12px;
      font-weight:850;
    }
    .chip.mode-chip{
      flex:1 1 0;
      min-width:0;
      min-height:32px;
      justify-content:center;
      text-align:center;
      padding:0 8px;
    }
    .chip.active{
      border-color:#c65637;
      background:#c65637;
      color:#fff;
      box-shadow:0 0 0 3px rgba(198,86,55,.14);
    }
    .stock-list{
      flex:1;
      min-height:0;
      overflow:auto;
      padding:10px;
      background:#fbf1e7;
      transition:background .28s ease;
    }
    body.theme-live .stock-list{
      background:#f9eddc;
    }
    .stock-card{
      width:100%;
      display:grid;
      gap:10px;
      padding:12px;
      margin-bottom:9px;
      border:1px solid transparent;
      border-radius:10px;
      background:#fffdf9;
      text-align:left;
      box-shadow:0 1px 2px rgba(108,78,54,.035);
      transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease,background .18s ease;
    }
    .stock-card:hover{
      transform:translateY(-1px);
      border-color:#dcc9b8;
      box-shadow:0 12px 28px rgba(108,78,54,.10);
    }
    .stock-card.selected{
      border-color:#d99a7e;
      background:#fff6ef;
      box-shadow:0 0 0 3px rgba(198,86,55,.10),0 12px 28px rgba(108,78,54,.10);
    }
    .stock-card.is-active-stock{
      border-width:2px;
      border-color:#d28348;
      background:linear-gradient(180deg,#fff0df 0%, #fff7ef 46%, #fffdf9 100%);
      box-shadow:inset 0 0 0 1px rgba(230,164,110,.24),0 14px 28px rgba(182,128,76,.13);
    }
    .stock-card.is-active-stock:hover{
      border-color:#c46d2f;
      box-shadow:inset 0 0 0 1px rgba(230,164,110,.30),0 18px 34px rgba(182,128,76,.18);
    }
    .stock-card.is-active-stock.selected{
      border-color:#bf6426;
      background:linear-gradient(180deg,#ffe7d1 0%, #fff3e5 42%, #fffaf4 100%);
      box-shadow:0 0 0 4px rgba(201,126,70,.14),inset 0 0 0 1px rgba(230,164,110,.34),0 18px 36px rgba(182,128,76,.18);
    }
    .stock-card-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
    }
    .stock-code{
      color:#243044;
      font-size:13px;
      font-weight:950;
      letter-spacing:.02em;
    }
    .stock-code-row{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }
    .stock-code-row .stock-code{
      flex:0 0 auto;
    }
    .stock-name{
      margin-top:2px;
      min-width:0;
      color:#243044;
      font-size:15px;
      line-height:1.25;
      font-weight:950;
      overflow:hidden;
      white-space:nowrap;
      text-overflow:ellipsis;
    }
    .stock-name.short{
      max-width:100%;
    }
    .stock-name-row{
      margin-top:2px;
      display:flex;
      align-items:center;
      min-width:0;
    }
    .stock-name-row .stock-name{
      margin-top:0;
      flex:1 1 auto;
    }
    .phase-badge{
      flex:0 0 auto;
      align-self:start;
      min-height:23px;
      display:inline-flex;
      align-items:center;
      padding:0 8px;
      border-radius:999px;
      background:#f2ece5;
      color:#71645a;
      font-size:11px;
      font-weight:900;
    }
    .phase-badge.active{
      background:#ffbf8c;
      color:#8c3619;
      box-shadow:inset 0 0 0 1px rgba(187,96,47,.18);
    }
    .phase-badge.wait{
      background:#ffd3aa;
      color:#955021;
      box-shadow:inset 0 0 0 1px rgba(190,118,53,.15);
    }
    .phase-badge.listed{background:#f3eee7;color:#6d6b67}
    .mini-metrics{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:7px;
    }
    .mini-metrics div{
      min-width:0;
    }
    .mini-metrics span{
      display:block;
      color:var(--muted);
      font-size:10px;
      font-weight:850;
    }
    .mini-metrics b{
      display:block;
      margin-top:3px;
      color:#243044;
      font-size:11.5px;
      font-weight:950;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .detail-panel{
      display:flex;
      flex-direction:column;
      height:100%;
      min-height:0;
      min-width:0;
      overflow:hidden;
    }
    .detail-hero{
      flex:0 0 auto;
      padding:20px 22px 18px;
      border-bottom:1px solid var(--line);
      background:
        radial-gradient(circle at 96% 0%,rgba(217,154,126,.18),transparent 34%),
        linear-gradient(180deg,#fffaf5,#fbf1e7);
      transition:background .28s ease,border-color .28s ease;
    }
    body.theme-live .detail-hero{
      border-bottom-color:#e0c3a3;
      background:
        radial-gradient(circle at 96% 0%,rgba(210,137,83,.20),transparent 34%),
        linear-gradient(180deg,#fff6ec,#f6e7d5);
    }
    .detail-title-row{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:16px;
      align-items:start;
    }
    .detail-title h2{
      font-size:30px;
      line-height:1.12;
      font-weight:950;
    }
    .detail-title-main{
      display:flex;
      align-items:flex-start;
      gap:10px;
      flex-wrap:wrap;
    }
    .detail-title p{
      color:var(--muted);
      font-size:13px;
      font-weight:750;
    }
    .detail-subline{
      margin-top:8px;
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .session-ticket{
      position:relative;
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      min-height:28px;
      padding:0 14px 0 16px;
      color:#5d4a3b;
      font-size:12px;
      font-weight:950;
      letter-spacing:.01em;
      clip-path:polygon(0 0, calc(100% - 12px) 0, 100% 50%, calc(100% - 12px) 100%, 0 100%, 6px 50%);
      box-shadow:0 6px 12px rgba(108,78,54,.08);
      border:1px solid rgba(191,155,129,.45);
      white-space:nowrap;
    }
    .session-ticket.compact{
      min-height:22px;
      padding:0 10px 0 12px;
      font-size:10px;
      box-shadow:none;
      clip-path:polygon(0 0, calc(100% - 9px) 0, 100% 50%, calc(100% - 9px) 100%, 0 100%, 4px 50%);
    }
    .session-ticket.compact b{
      font-size:10px;
      margin-left:3px;
    }
    .session-ticket.up{
      background:linear-gradient(135deg,#deefe4,#d1e8d8);
      color:#246847;
      border-color:rgba(71,132,89,.34);
    }
    .session-ticket.down{
      background:linear-gradient(135deg,#f6dfdf,#f1d1d1);
      color:#9a3c3c;
      border-color:rgba(165,77,77,.28);
    }
    .session-ticket.upcoming{
      background:linear-gradient(135deg,#efe4d8,#e8d9c8);
      color:#7f593c;
      border-color:rgba(154,117,86,.28);
    }
    .session-ticket b{
      font-size:12px;
      font-weight:950;
      margin-left:4px;
    }
    .detail-actions{
      display:flex;
      gap:8px;
      justify-content:flex-end;
      flex-wrap:wrap;
    }
    .primary-btn,.ghost-btn{
      min-height:36px;
      padding:0 13px;
      border-radius:9px;
      font-size:13px;
      font-weight:900;
    }
    .primary-btn{
      border:1px solid var(--blue);
      background:var(--blue);
      color:#fff;
      box-shadow:0 10px 20px rgba(198,86,55,.20);
    }
    .ghost-btn{
      border:1px solid var(--line);
      background:#fffdf9;
      color:#3f4a5d;
    }
    .link-btn{
      min-height:30px;
      padding:0 10px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fffdf9;
      color:#7b523f;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }
    .link-btn.primary-soft{
      border-color:#e4b19e;
      background:#fff1e9;
      color:#a2432b;
    }
    .metric-grid{
      display:grid;
      grid-template-columns:repeat(5,minmax(120px,1fr));
      gap:10px;
      margin-top:18px;
    }
    .metric-card{
      min-height:86px;
      padding:12px;
      border:1px solid #ebddcf;
      border-radius:10px;
      background:rgba(255,253,249,.9);
    }
    .metric-card span{
      display:block;
      color:var(--muted);
      font-size:12px;
      font-weight:850;
    }
    .metric-card b{
      display:block;
      margin-top:8px;
      font-size:20px;
      line-height:1.1;
      font-weight:950;
      overflow-wrap:anywhere;
      font-variant-numeric:tabular-nums;
    }
    .metric-card small{
      display:block;
      margin-top:5px;
      color:#9a8575;
      font-size:11px;
      font-weight:750;
    }
    .detail-body{
      flex:1 1 auto;
      min-height:0;
      display:grid;
      grid-template-columns:minmax(0,1.18fr) minmax(320px,.82fr);
      gap:16px;
      padding:16px;
      background:#f8efe6;
      overflow:hidden;
    }
    body.theme-live .detail-body{
      background:#f5e7d6;
    }
    .content-card{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:#fffdf9;
      box-shadow:0 12px 28px rgba(108,78,54,.075);
      overflow:hidden;
    }
    .content-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      padding:15px 16px 0;
    }
    .content-head h3{
      font-size:18px;
      line-height:1.25;
      font-weight:950;
    }
    .content-head span{
      color:var(--muted);
      font-size:12px;
      font-weight:800;
      text-align:right;
    }
    .head-copy{
      min-width:0;
    }
    .head-actions{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:7px;
      flex-wrap:wrap;
    }
    .chart-wrap{
      position:relative;
      padding:8px 14px 14px;
      overflow:hidden;
    }
    .chart-wrap svg{
      display:block;
      width:100%;
      height:auto;
      overflow:hidden;
    }
    .axis{stroke:#e5d7c9;stroke-width:1}
    .grid-line{stroke:#f0e5dc;stroke-width:1}
    .curve{fill:none;stroke:#426d9c;stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}
    .curve.series-b{stroke:#5f8f7d}
    .curve-area{fill:rgba(66,109,156,.09)}
    .curve-area.series-b{fill:rgba(95,143,125,.10)}
    .point{fill:#426d9c;stroke:#fffaf5;stroke-width:2}
    .point.series-b{fill:#5f8f7d}
    .key-point{fill:#fff1e8;stroke:#c65637;stroke-width:2.6}
    .key-point.series-b{stroke:#5f8f7d}
    .annotation-line{stroke:#b55a40;stroke-width:1.5;stroke-dasharray:3 3}
    .annotation-arrow{fill:#b55a40}
    .annotation-bg{fill:rgba(255,250,245,.94);stroke:#ead7c6;stroke-width:1}
    .axis-label{fill:#7a6759;font-size:11px;font-weight:800}
    .key-label{fill:#a2432b;font-size:17px;font-weight:950}
    .key-value{fill:#243044;font-size:16px;font-weight:950}
    .chart-hover{
      fill:transparent;
      cursor:pointer;
    }
    .chart-tooltip{
      position:fixed;
      z-index:50;
      min-width:138px;
      max-width:240px;
      padding:9px 11px;
      border:1px solid #dec7b5;
      border-radius:12px;
      background:rgba(255,251,247,.98);
      box-shadow:0 14px 34px rgba(73,48,29,.16);
      color:#263247;
      font-size:12px;
      line-height:1.55;
      font-weight:800;
      pointer-events:none;
      opacity:0;
      transition:opacity .12s ease;
      white-space:pre-line;
    }
    .chart-tooltip.show{
      opacity:1;
    }
    .chart-empty{
      min-height:240px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:14px;
      font-weight:750;
      text-align:center;
      padding:22px;
    }
    .insight-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      align-self:stretch;
    }
    .insight-grid .profile-card{
      min-height:100%;
    }
    .profile-card{
      padding:16px;
    }
    .profile-title-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }
    .profile-card h3{
      font-size:18px;
      font-weight:950;
    }
    .profile-card p{
      color:#3f4a5d;
      font-size:14px;
      line-height:1.78;
      font-weight:650;
    }
    .profile-type{
      margin-top:2px;
      margin-left:auto;
      flex:0 0 auto;
      align-self:center;
      padding:5px 9px;
      border-radius:999px;
      background:#ece2d8;
      color:#715c4c;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }
    .profile-tags{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
      margin-top:12px;
    }
    .profile-tags span{
      padding:5px 8px;
      border-radius:999px;
      background:#f3eadf;
      color:#6f5c4e;
      font-size:12px;
      font-weight:850;
    }
    .profile-explain{
      margin-top:10px;
      display:flex;
      flex-direction:column;
      gap:5px;
    }
    .profile-explain span{
      color:#7c695a;
      font-size:12px;
      line-height:1.55;
      font-weight:700;
    }
    .market-summary{
      padding:0 16px 16px;
    }
    .market-row{
      display:grid;
      grid-template-columns:96px minmax(0,1fr) 112px;
      gap:12px;
      align-items:center;
      padding:14px 0;
      border-top:1px solid var(--line-soft);
    }
    .market-row:first-child{border-top:0}
    .venue{
      font-weight:950;
      line-height:1.2;
    }
    .venue small,
    .market-period{
      display:block;
      margin-top:4px;
      color:var(--muted);
      font-size:12px;
      font-weight:800;
    }
    .price-stack{
      display:grid;
      gap:2px;
      margin-top:5px;
      color:#243044;
      font-size:12px;
      font-weight:900;
      font-variant-numeric:tabular-nums;
    }
    .range{
      min-width:0;
    }
    .range-track{
      position:relative;
      height:10px;
      border-radius:999px;
      background:#eee3d8;
      overflow:hidden;
    }
    .range-fill{
      position:absolute;
